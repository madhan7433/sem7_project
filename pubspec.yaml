name: sem7_project
description: "FarmDirect - Mobile App for Direct Market Access for Farmers"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.3.0
  flutter_svg: ^2.2.1
  lottie: ^3.3.2

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^16.0.0

  # Networking
  dio: ^5.9.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0

  # Utilities
  intl: ^0.20.2
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2

  # Icons
  font_awesome_flutter: ^10.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/